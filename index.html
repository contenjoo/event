<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎪 이벤트 광장</title>
<style>
  :root {
    --bg: #0f1226;
    --panel: #1a1f3c;
    --panel-2: #232a52;
    --accent: #ff5d8f;
    --accent-2: #6c5ce7;
    --text: #eef1ff;
    --muted: #9aa3cf;
    --border: #2e3566;
    --gold: #ffd36e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: radial-gradient(1200px 600px at 70% -10%, #2a2f63 0%, var(--bg) 55%) fixed;
    color: var(--text);
    min-height: 100vh;
  }
  header { text-align: center; padding: 44px 16px 10px; }
  header h1 { margin: 0; font-size: 32px; letter-spacing: -0.5px; }
  header p { margin: 10px 0 0; color: var(--muted); font-size: 15px; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px; }

  a.event {
    display: flex; align-items: center; gap: 16px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
    text-decoration: none;
    color: var(--text);
    transition: .15s;
  }
  a.event:hover { border-color: var(--accent-2); transform: translateY(-2px); }
  a.event:active { transform: translateY(1px); }
  .event .logo { font-size: 40px; }
  .event .name { font-size: 19px; font-weight: 800; }
  .event .desc { font-size: 13.5px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .event .go { margin-left: auto; color: var(--accent); font-size: 22px; }
  .event .badge {
    display: inline-block; margin-left: 8px; vertical-align: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; font-size: 11px; font-weight: 800;
    border-radius: 999px; padding: 2px 8px;
  }

  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0 32px; }
</style>
</head>
<body>
<header>
  <h1>🎪 이벤트 광장</h1>
  <p>참여할 이벤트를 선택하세요!</p>
</header>

<div class="wrap">
  <a class="event" href="/scratch.html">
    <span class="logo">🎫</span>
    <span>
      <span class="name">2026 쉐어워즈<span class="badge">NEW</span></span>
      <div class="desc">디지로그, 나만의 수업 속도를 찾아서 · with 오늘배움 — 즉석복권 긁고 주이즈·Snorkl·콤보 경품 받기!</div>
    </span>
    <span class="go">›</span>
  </a>

  <a class="event" href="/roulette.html">
    <span class="logo">🎁</span>
    <span>
      <span class="name">오늘부터 캔바</span>
      <div class="desc">돌림판 룰렛으로 당첨자·경품 추첨 — 한 명씩 뽑기, 한 번에 매칭 지원</div>
    </span>
    <span class="go">›</span>
  </a>
</div>

<footer>🎪 이벤트 광장</footer>
</body>
</html>
